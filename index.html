<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>หนี้เบาใจ</title>
    <link rel="icon" href="icon.png?v=2" />

<link rel="apple-touch-icon" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ICON">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #fef9e8 0%, #fff3e0 100%);
            font-family: 'Prompt', sans-serif;
            padding: 1rem 1rem 2rem;
            min-height: 100vh;
            color: #2d3e50;
        }
        .sticker-bg {
            position: fixed;
            bottom: 10px;
            right: 5px;
            font-size: 80px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }
        .hero {
            text-align: center;
            margin-bottom: 1.2rem;
            background: rgba(255,255,245,0.7);
            border-radius: 2rem;
            padding: 0.8rem;
        }
        .hero h1 {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(125deg, #f39c12, #e67e22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .profile-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff5e8;
            border-radius: 3rem;
            padding: 0.4rem 1rem;
            margin-top: 10px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .profile-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #b45f2b;
        }
        .profile-input-group {
            display: flex;
            flex: 1;
            gap: 8px;
            align-items: center;
        }
        #profileName {
            background: white;
            border: 1px solid #ffdead;
            border-radius: 2rem;
            padding: 8px 14px;
            font-family: 'Prompt', sans-serif;
            flex: 1;
            font-size: 0.85rem;
            min-width: 120px;
        }
        .btn-icon {
            background: #f39c12;
            border: none;
            border-radius: 2rem;
            padding: 8px 14px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-icon.edit-mode {
            background: #27ae60;
        }
        .quote-bubble {
            background: #fff6e5;
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            color: #b45f2b;
            display: inline-block;
        }
        /* Dashboard พร้อมหลอดความคืบหน้า */
        .dashboard {
            background: white;
            border-radius: 1.8rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-card {
            flex: 1;
            background: #fef7ef;
            border-radius: 1.5rem;
            padding: 10px 5px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #e67e22;
            word-break: break-word;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #8b6946;
        }
        .progress-section {
            margin-top: 8px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-bottom: 6px;
            color: #a5713c;
        }
        .progress-bar-bg-dash {
            background: #ffe0b5;
            border-radius: 30px;
            height: 12px;
            overflow: hidden;
        }
        .progress-fill-dash {
            background: linear-gradient(90deg, #f39c12, #e67e22);
            width: 0%;
            height: 12px;
            border-radius: 30px;
            transition: width 0.3s;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 1.2rem;
            background: #fff3e4;
            border-radius: 3rem;
            padding: 5px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            border-radius: 2rem;
            font-weight: 600;
            font-family: 'Prompt', sans-serif;
            color: #a5713c;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: white;
            color: #e67e22;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .card-add {
            background: white;
            border-radius: 1.8rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
        }
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .input-group input {
            background: #fffbf5;
            border: 1px solid #ffdead;
            padding: 12px 16px;
            border-radius: 2rem;
            font-size: 0.9rem;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(95deg, #f39c12, #e67e22);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .quick-add {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }
        .btn-quick {
            flex: 1;
            background: #fef2e0;
            border: 1px solid #ffd89c;
            border-radius: 2rem;
            padding: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #b45f2b;
            cursor: pointer;
        }
        .debt-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .debt-card {
            background: white;
            border-radius: 1.6rem;
            padding: 1rem;
            border: 1px solid #ffefd6;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
            cursor: grab;
            transition: 0.1s;
        }
        .debt-card:active {
            cursor: grabbing;
        }
        .debt-card.cleared-card {
            background: #eaf7e6;
            border-left: 6px solid #2ecc71;
        }
        .debt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .debt-name {
            font-weight: 700;
            font-size: 1.2rem;
            color: #c0392b;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .badge-status {
            font-size: 0.65rem;
            background: #fdebd0;
            padding: 4px 12px;
            border-radius: 50px;
        }
        .amount-panel {
            background: #fff7ef;
            border-radius: 1.2rem;
            padding: 0.6rem;
            text-align: center;
            margin: 8px 0;
        }
        .remaining-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #e67e22;
        }
        .progress-bar-bg {
            background: #ffe0b5;
            border-radius: 20px;
            height: 8px;
            margin: 6px 0;
        }
        .progress-fill {
            background: #f39c12;
            height: 8px;
            border-radius: 20px;
            width: 0%;
        }
        .payment-section {
            display: flex;
            gap: 8px;
            margin: 12px 0 8px;
        }
        .payment-input {
            flex: 2;
            border: 1px solid #ffd7a5;
            border-radius: 2rem;
            padding: 10px 12px;
            font-size: 0.85rem;
        }
        .btn-pay {
            background: #27ae60;
            border: none;
            color: white;
            border-radius: 2rem;
            padding: 0 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-add-debt-small, .btn-delete {
            flex: 1;
            background: #f39c12;
            border: none;
            color: white;
            border-radius: 2rem;
            padding: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        .btn-delete {
            background: #d35400;
        }
        .history-log {
            background: #fef5e8;
            border-radius: 1rem;
            padding: 6px 8px;
            font-size: 0.6rem;
            margin-top: 10px;
            max-height: 80px;
            overflow-y: auto;
        }
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #b97745;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-container {
            background: white;
            width: 85%;
            max-width: 300px;
            border-radius: 2rem;
            padding: 1.2rem;
            text-align: center;
        }
        .modal-input {
            width: 100%;
            padding: 10px;
            border-radius: 2rem;
            border: 1px solid #ffdead;
            margin: 12px 0;
            text-align: center;
        }
        .modal-btn {
            background: #f39c12;
            border: none;
            padding: 10px;
            border-radius: 2rem;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }
        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1100;
            white-space: normal;
            text-align: center;
            max-width: 90%;
        }
        .drag-icon {
            font-size: 0.8rem;
            color: #c0a080;
            margin-right: 6px;
        }
    </style>
</head>
<body>
<div class="sticker-bg">🧸✨🍚🐢💪</div>
<div class="app-container">
    <div class="hero">
        <h1><i class="fas fa-hand-peace"></i> หนี้เบาใจ <span class="sticker-emoji">🕊️</span></h1>
        <div class="profile-row">
            <span class="profile-label"><i class="fas fa-user"></i> ชื่อคุณ:</span>
            <div class="profile-input-group">
                <input type="text" id="profileName" placeholder="กรอกชื่อ" maxlength="20" value="" disabled>
                <button id="editProfileBtn" class="btn-icon"><i class="fas fa-pen"></i> แก้ไข</button>
                <button id="saveProfileBtn" class="btn-icon edit-mode" style="display:none;"><i class="fas fa-save"></i> บันทึก</button>
            </div>
            <div class="quote-bubble" id="randomQuote"><i class="fas fa-heart"></i> คำคม</div>
        </div>
    </div>

    <!-- Dashboard พร้อมหลอดความคืบหน้า -->
    <div class="dashboard">
        <div class="stats-row">
            <div class="stat-card"><div class="stat-value" id="totalDebtStat">0</div><div class="stat-label">หนี้ทั้งหมด</div></div>
            <div class="stat-card"><div class="stat-value" id="paidStat">0</div><div class="stat-label">จ่ายไปแล้ว</div></div>
            <div class="stat-card"><div class="stat-value" id="remainingStat">0</div><div class="stat-label">คงเหลือ</div></div>
        </div>
        <div class="progress-section">
            <div class="progress-label">
                <span>ความคืบหน้า</span>
                <span id="percentText">0%</span>
            </div>
            <div class="progress-bar-bg-dash">
                <div class="progress-fill-dash" id="progressFillDash" style="width:0%"></div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="active">💰 กำลังชำระ</button>
        <button class="tab-btn" data-tab="cleared">✅ ปิดหนี้แล้ว</button>
    </div>

    <div class="card-add">
        <div class="form-grid">
            <div class="input-group"><input type="text" id="debtNameInput" placeholder="ชื่อหนี้ (เช่น ยืมเพื่อน)"></div>
            <div class="input-group"><input type="number" id="debtAmountInput" placeholder="จำนวนเงิน (บาท)"></div>
            <button id="addDebtBtn" class="btn-primary"><i class="fas fa-plus-circle"></i> เพิ่มหนี้ใหม่</button>
            <div class="quick-add">
                <button class="btn-quick" id="quickRice">🍚 ค่าข้าว 60</button>
                <button class="btn-quick" id="quickSnack">☕ ขนม 35</button>
                <button class="btn-quick" id="quickTravel">🚌 เดินทาง 50</button>
            </div>
        </div>
    </div>

    <div id="debtListContainer" class="debt-grid"></div>
</div>

<div id="customModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-emoji" id="modalEmoji">🧸</div>
        <div class="modal-title" id="modalTitle">แจ้งเตือน</div>
        <div class="modal-message" id="modalMessage"></div>
        <input type="number" id="modalInput" class="modal-input" placeholder="จำนวนเงิน" style="display:none">
        <button id="modalConfirmBtn" class="modal-btn">ตกลง</button>
    </div>
</div>

<script>
    // ========== ฟังก์ชันจัดรูปแบบตัวเลขให้มี comma ==========
    function formatNumber(num) {
        if (num === undefined || num === null) return '0';
        let fixed = num.toFixed(2);
        let parts = fixed.split('.');
        let integerPart = parts[0];
        let decimalPart = parts[1];
        integerPart = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return decimalPart === '00' ? integerPart : integerPart + '.' + decimalPart;
    }
    
    function formatNumberNoDecimal(num) {
        let integerPart = Math.floor(num).toString();
        integerPart = integerPart.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return integerPart;
    }

    // ========== Data ==========
    let debts = [];
    let userName = localStorage.getItem('debt_user_name') || '';
    let currentTab = 'active';
    let isEditMode = false;
    
    const quotes = ["💪 จ่ายวันละนิด หนี้หมดไว", "🌸 ใกล้ freedom แล้ว", "🍀 จ่ายตามกำลัง สบายใจ", "🌟 วันนี้จ่ายเพิ่ม ความเครียดลด", "🐢 ช้าแต่มั่นคง", "🧸 คุณทำได้!", "✨ ทุกบาทคือความภูมิใจ", "🎉 ปิดหนี้แล้ว เก่งมาก", "💖 ไม่ต้องรีบ ขอให้สม่ำเสมอ", "🏆 หนี้ลด = พลังบวกเพิ่ม"];

    function saveData() {
        localStorage.setItem('debt_tracker_final_v3', JSON.stringify(debts));
        localStorage.setItem('debt_user_name', userName);
    }
    
    function loadData() {
        const stored = localStorage.getItem('debt_tracker_final_v3');
        if(stored) {
            debts = JSON.parse(stored);
            debts.forEach(d => {
                d.remaining = (d.remaining !== undefined && d.remaining !== null) ? d.remaining : d.totalAmount;
                d.history = d.history || [];
            });
        } else {
            debts = [
                { id: '1', name: 'ยืมเพื่อน', totalAmount: 500, remaining: 500, history: [], order: 1 },
                { id: '2', name: 'ค่าห้องค้าง', totalAmount: 3200, remaining: 3200, history: [], order: 2 },
                { id: '3', name: 'ค่าข้าวร้านประจำ', totalAmount: 180, remaining: 0, history: [{ date: new Date().toLocaleString(), amount: 180, remainingAfter: 0, note: 'ชำระเต็ม' }], order: 3 }
            ];
        }
        const nameInput = document.getElementById('profileName');
        if(nameInput) nameInput.value = userName;
        renderDashboard();
        renderDebtsByTab();
    }
    
    function renderDashboard() {
        let total = 0, paidTotal = 0;
        debts.forEach(d => {
            total += d.totalAmount;
            paidTotal += (d.totalAmount - d.remaining);
        });
        let remainingTotal = total - paidTotal;
        let percent = total > 0 ? (paidTotal/total)*100 : 0;
        document.getElementById('totalDebtStat').innerHTML = formatNumber(total);
        document.getElementById('paidStat').innerHTML = formatNumber(paidTotal);
        document.getElementById('remainingStat').innerHTML = formatNumber(remainingTotal);
        document.getElementById('percentText').innerHTML = percent.toFixed(0) + '%';
        document.getElementById('progressFillDash').style.width = percent + '%';
    }
    
    function getDisplayName() {
        let name = userName.trim();
        if(name === "") return "เพื่อนรัก";
        return name;
    }
    
    function showMotivationToast(msg, isCeleb = false) {
        let toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerHTML = `<i class="fas fa-smile"></i> ${msg}`;
        if(isCeleb) toast.style.background = "#2ecc71";
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    function showPopup(emoji, title, message, showInput = false, callback = null) {
        const modal = document.getElementById('customModal');
        const modalEmoji = document.getElementById('modalEmoji');
        const modalTitle = document.getElementById('modalTitle');
        const modalMsg = document.getElementById('modalMessage');
        const modalInput = document.getElementById('modalInput');
        const confirmBtn = document.getElementById('modalConfirmBtn');
        modalEmoji.innerText = emoji;
        modalTitle.innerText = title;
        modalMsg.innerText = message;
        if(showInput) {
            modalInput.style.display = 'block';
            modalInput.value = '';
        } else modalInput.style.display = 'none';
        const handler = () => {
            let val = showInput ? modalInput.value : null;
            modal.classList.remove('active');
            confirmBtn.removeEventListener('click', handler);
            if(callback) callback(val);
        };
        confirmBtn.addEventListener('click', handler);
        modal.classList.add('active');
        if(showInput) modalInput.focus();
    }
    
    function showAlert(message) { showPopup('📢', 'แจ้งเตือน', message, false); }
    
    function addDebtCore(name, amount) {
        if(!name.trim()) { showAlert('กรุณากรอกชื่อหนี้'); return false; }
        if(isNaN(amount) || amount<=0) { showAlert('จำนวนเงินต้องมากกว่า 0'); return false; }
        let newId = Date.now() + '-' + Math.random();
        let newDebt = {
            id: newId,
            name: name.trim(),
            totalAmount: amount,
            remaining: amount,
            history: [],
            order: debts.length
        };
        debts.push(newDebt);
        saveData();
        renderDashboard();
        renderDebtsByTab();
        showMotivationToast(`➕ เพิ่มหนี้ "${name}" ${formatNumber(amount)} บาท เรียบร้อย`);
        return true;
    }
    
    function increaseDebt(debtId) {
        let debt = debts.find(d => d.id === debtId);
        if(!debt) return;
        showPopup('➕', 'เพิ่มหนี้', `เพิ่มยอด "${debt.name}" เท่าไหร่?`, true, (val) => {
            let add = parseFloat(val);
            if(isNaN(add) || add<=0) { showAlert('กรุณาใส่จำนวนเงินมากกว่า 0'); return; }
            debt.totalAmount += add;
            debt.remaining += add;
            debt.history.unshift({ date: new Date().toLocaleString(), amount: add, remainingAfter: debt.remaining, note: `เพิ่มหนี้ +${formatNumber(add)} บาท` });
            saveData();
            renderDashboard();
            renderDebtsByTab();
            showMotivationToast(`📈 เพิ่มหนี้ "${debt.name}" อีก ${formatNumber(add)} บาท รวม ${formatNumber(debt.totalAmount)} บาท`);
        });
    }
    
    function payDebt(debtId, payAmount) {
        let debt = debts.find(d => d.id === debtId);
        if(!debt) return;
        let amount = parseFloat(payAmount);
        if(isNaN(amount) || amount<=0) { showAlert('กรุณากรอกจำนวนเงินให้ถูกต้อง'); return; }
        if(amount > debt.remaining) { showAlert(`ยอดคงเหลือแค่ ${formatNumber(debt.remaining)} บาท`); return; }
        debt.remaining = parseFloat((debt.remaining - amount).toFixed(2));
        debt.history.unshift({ date: new Date().toLocaleString(), amount: amount, remainingAfter: debt.remaining, note: `จ่าย ${formatNumber(amount)} บาท` });
        let userNameDisplay = getDisplayName();
        if(debt.remaining === 0) {
            showMotivationToast(`🎉 ยินดีด้วยคุณ ${userNameDisplay}! ปิดหนี้ "${debt.name}" สำเร็จแล้ว! 🎉`, true);
        } else {
            showMotivationToast(`✅ คุณ ${userNameDisplay} จ่าย ${formatNumber(amount)} บาท เหลือ ${formatNumber(debt.remaining)} บาท`);
        }
        saveData();
        renderDashboard();
        renderDebtsByTab();
    }
    
    function deleteDebt(debtId) {
        let debt = debts.find(d => d.id === debtId);
        if(!debt) return;
        showPopup('🗑️', 'ยืนยันลบ', `ลบหนี้ "${debt.name}" ใช่ไหม?`, false, () => {
            debts = debts.filter(d => d.id !== debtId);
            saveData();
            renderDashboard();
            renderDebtsByTab();
            showMotivationToast(`🗑️ ลบหนี้ "${debt.name}" แล้ว`);
        });
    }
    
    function updateOrder(sortedIds) {
        let newOrder = [];
        for(let id of sortedIds) {
            let debt = debts.find(d => d.id === id);
            if(debt) newOrder.push(debt);
        }
        debts = newOrder;
        saveData();
        renderDebtsByTab();
    }
    
    function renderDebtsByTab() {
        const container = document.getElementById('debtListContainer');
        if(!container) return;
        let filtered = debts.filter(d => currentTab === 'active' ? d.remaining > 0 : d.remaining <= 0);
        if(filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-smile"></i> <p>${currentTab === 'active' ? 'ไม่มีหนี้ที่กำลังชำระ' : 'ยังไม่มีหนี้ที่ปิดแล้ว'}</p></div>`;
            return;
        }
        let html = '';
        filtered.forEach(debt => {
            const percentPaid = debt.totalAmount > 0 ? ((debt.totalAmount - debt.remaining)/debt.totalAmount)*100 : 0;
            const isCleared = debt.remaining <= 0;
            let historyHtml = `<div class="history-log"><i class="fas fa-history"></i> ประวัติล่าสุด<br>`;
            if(!debt.history.length) historyHtml += `<span>✨ ยังไม่มีรายการ</span>`;
            else debt.history.slice(0,3).forEach(h => {
                let icon = h.note.includes('เพิ่ม') ? '➕' : '💸';
                historyHtml += `<span>${icon} ${h.date} : ${h.note} (เหลือ ${formatNumber(h.remainingAfter)})</span>`;
            });
            historyHtml += `</div>`;
            html += `
                <div class="debt-card ${isCleared ? 'cleared-card' : ''}" data-id="${debt.id}">
                    <div class="debt-header">
                        <div class="debt-name"><i class="fas fa-grip-vertical drag-icon"></i> ${escapeHtml(debt.name)}</div>
                        <div class="badge-status">${isCleared ? '✅ ปิดแล้ว' : '📌 กำลังชำระ'}</div>
                    </div>
                    <div class="amount-panel">
                        <div class="remaining-value">${formatNumber(debt.remaining)} <span style="font-size:0.9rem;">บาท</span></div>
                        <div class="progress-bar-bg"><div class="progress-fill" style="width:${percentPaid}%"></div></div>
                        <div style="font-size:0.7rem;">รวม ${formatNumber(debt.totalAmount)} บาท จ่ายแล้ว ${formatNumber(debt.totalAmount - debt.remaining)}</div>
                        <div class="motivation-tag" style="font-size:0.65rem;">✨ ${quotes[Math.floor(Math.random()*quotes.length)]}</div>
                    </div>
                    ${!isCleared ? `
                    <div class="payment-section">
                        <input type="number" id="pay-${debt.id}" class="payment-input" placeholder="จำนวนที่จ่าย">
                        <button class="btn-pay" data-id="${debt.id}"><i class="fas fa-hand-holding-heart"></i> จ่าย</button>
                    </div>
                    ` : `<div style="background:#d5f5e3; border-radius:1rem; padding:6px; text-align:center; margin:8px 0;">🎊 ปิดหนี้สำเร็จ! ยินดีด้วย 🎊</div>`}
                    <div class="action-buttons">
                        <button class="btn-add-debt-small" data-id="${debt.id}" data-action="increase"><i class="fas fa-plus"></i> เพิ่มหนี้</button>
                        <button class="btn-delete" data-id="${debt.id}" data-action="delete"><i class="fas fa-trash"></i> ลบ</button>
                    </div>
                    ${historyHtml}
                </div>
            `;
        });
        container.innerHTML = html;
        
        document.querySelectorAll('.btn-pay').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = btn.getAttribute('data-id');
                let inp = document.getElementById(`pay-${id}`);
                let val = inp?.value;
                if(!val) { showAlert('กรุณากรอกจำนวนเงิน'); return; }
                payDebt(id, val);
                if(inp) inp.value = '';
            });
        });
        document.querySelectorAll('.btn-add-debt-small').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = btn.getAttribute('data-id');
                increaseDebt(id);
            });
        });
        document.querySelectorAll('.btn-delete').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let id = btn.getAttribute('data-id');
                deleteDebt(id);
            });
        });
        
        if(currentTab === 'active') {
            const containerEl = document.getElementById('debtListContainer');
            if(containerEl && window.Sortable) {
                new Sortable(containerEl, {
                    animation: 200,
                    handle: '.drag-icon, .debt-name',
                    onEnd: function(evt) {
                        let items = document.querySelectorAll('#debtListContainer .debt-card');
                        let newIds = Array.from(items).map(el => el.getAttribute('data-id'));
                        let filteredNew = newIds.filter(id => debts.some(d => d.id === id));
                        updateOrder(filteredNew);
                    }
                });
            }
        }
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function updateRandomQuote() {
        const quoteSpan = document.querySelector('#randomQuote');
        if(quoteSpan) quoteSpan.innerHTML = `<i class="fas fa-heart"></i> ${quotes[Math.floor(Math.random()*quotes.length)]}`;
    }
    setInterval(updateRandomQuote, 8000);
    
    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        updateRandomQuote();
        
        // ปุ่มเพิ่มหนี้
        document.getElementById('addDebtBtn').addEventListener('click', () => {
            let name = document.getElementById('debtNameInput').value;
            let amount = parseFloat(document.getElementById('debtAmountInput').value);
            if(addDebtCore(name, amount)) {
                document.getElementById('debtNameInput').value = '';
                document.getElementById('debtAmountInput').value = '';
            }
        });
        
        // ปุ่มด่วน
        document.getElementById('quickRice').addEventListener('click', () => addDebtCore('ค่าข้าวร้านประจำ', 60));
        document.getElementById('quickSnack').addEventListener('click', () => addDebtCore('ขนม/กาแฟระหว่างวัน', 35));
        document.getElementById('quickTravel').addEventListener('click', () => addDebtCore('ค่าเดินทาง', 50));
        
        // จัดการชื่อ: แก้ไขและบันทึก
        const profileInput = document.getElementById('profileName');
        const editBtn = document.getElementById('editProfileBtn');
        const saveBtn = document.getElementById('saveProfileBtn');
        
        editBtn.addEventListener('click', () => {
            profileInput.disabled = false;
            profileInput.focus();
            editBtn.style.display = 'none';
            saveBtn.style.display = 'flex';
        });
        
        saveBtn.addEventListener('click', () => {
            userName = profileInput.value.trim();
            localStorage.setItem('debt_user_name', userName);
            profileInput.disabled = true;
            saveBtn.style.display = 'none';
            editBtn.style.display = 'flex';
            showMotivationToast(`💖 บันทึกชื่อเรียบร้อย สวัสดีคุณ ${getDisplayName()}`);
            renderDebtsByTab(); // รีเฟรชเพื่อแสดงชื่อใน toast ครั้งหน้า
        });
        
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTab = btn.getAttribute('data-tab');
                renderDebtsByTab();
            });
        });
    });
</script>
</body>
</html>
